llm:
  provider: openrouter
  model: google/gemini-2.5-flash-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: null

gateways:
  telegram:
    enabled: false
    token: ${TELEGRAM_BOT_TOKEN}
  discord:
    enabled: false
    token: ${DISCORD_BOT_TOKEN}
  slack:
    enabled: false
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
